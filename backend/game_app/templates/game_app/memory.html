{% load static %}

<script>
const IMAGE_BASE = "{% static 'games/memory/images/' %}";
</script>
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xotira O‘yini</title>

    <link rel="stylesheet" href="{% static 'games/memory/memory.css' %}">
</head>

<body>

<div class="memory-container">

    <!-- TOP PANEL -->
    <div class="top-panel">

        <div class="game-info">
            <h1>🧠 Xotira O‘yini</h1>
            <p>Kartalarni eslab juftlarini toping</p>
        </div>

        <div class="stats-box">
          <div class="stat">
              <span>⏳ Time</span>
             <h2 id="timer">60</h2>
          </div>
            <div class="stat">
                <span>⭐ Score</span>
                <h2 id="score">0</h2>
            </div>

            <div class="stat">
                <span>🎯 Moves</span>
                <h2 id="moves">0</h2>
            </div>

            <div class="stat">
                <span>🔥 Level</span>
                <h2 id="level">1</h2>
            </div>
        </div>

    </div>

    <!-- GAME AREA -->
    <div class="game-card">

        <div class="game-header">
            <h2>Memory Challenge</h2>

            <button id="restartBtn">
                🔄 Restart
            </button>
        </div>

        <div class="grid" id="grid"></div>

    </div>

    <!-- BACK -->
    <div class="back-btn-box">
        <a href="{% url 'game_app:games_list' %}" class="back-btn">
            ⬅ O‘yinlarga qaytish
        </a>
    </div>

</div>
<div class="win-modal" id="winModal">

    <div class="win-box">

        <h1>🏆 LEVEL COMPLETED!</h1>

        <p id="finalScore"></p>

        <button onclick="nextLevel()">
            NEXT LEVEL 🚀
        </button>

    </div>

</div>
<form id="resultForm" method="POST">
    {% csrf_token %}
    <input type="hidden" name="score" id="scoreInput">
    <input type="hidden" name="time" id="timeInput">
</form>
<script>
  const GAME_ID = {{ game.id }};
</script>
<script src="{% static 'games/memory/memory.js' %}"></script>

</body>
</html>
